name: axiaweb
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # LIBRERÍA DE AUDIO: Para música y efectos
  audioplayers: ^5.2.1 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # REGISTRO DE ASSETS: Aquí es donde la APP buscará tus sonidos
  assets:
    - assets/sonidos/
    # - assets/imagenes/ (Descomenta esto cuando tengas fotos de cartas)
